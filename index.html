<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>My Projects</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: system-ui, sans-serif; background: #f9f9f7; color: #1a1a1a; padding: 60px 24px; }
    .container { max-width: 640px; margin: 0 auto; }
    h1 { font-size: 2rem; font-weight: 600; margin-bottom: 8px; }
    p { color: #666; margin-bottom: 40px; }
    .card { background: white; border: 1px solid #e5e5e5; border-radius: 12px; padding: 24px; margin-bottom: 16px; }
    .card h2 { font-size: 1.1rem; margin-bottom: 6px; }
    .card p { color: #888; font-size: 0.9rem; margin: 0; }
  </style>
</head>
<body>
  <div class="container">
    <h1>Hi, I build things for the web.</h1>
    <p>Websites, tools, and systems — built fast and ready to launch.</p>
    <div class="card">
      <h2>Project one coming soon</h2>
      <p>Landing pages, booking systems, dashboards — ask me what you need.</p>
    </div>
  </div>
</body>
</html>
